<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AttendQR — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0e0f11;--surface:#16181c;--surface2:#1e2126;
      --border:#2a2d35;--text:#f0ede6;--muted:#7a7f8e;
      --accent:#c8f564;--accent-dim:#a8d44a;
      --red:#ff6b6b;--red-bg:rgba(255,107,107,0.08);
      --green:#5dcc8a;--green-bg:rgba(93,204,138,0.08);
      --font-display:'Fraunces',Georgia,serif;
      --font-body:'DM Sans',sans-serif;
      --font-mono:'DM Mono',monospace;
      --radius:10px;--radius-lg:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
    .container{width:100%;max-width:400px;}
    .brand{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:6px;letter-spacing:-0.5px;}
    .brand span{color:var(--muted);font-weight:300;}
    .brand-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:36px;font-family:var(--font-mono);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;animation:rise 0.4s ease both;}
    @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
    .tab{flex:1;text-align:center;padding:10px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;font-family:var(--font-mono);}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-bottom:6px;}
    .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:14px;padding:11px 14px;outline:none;transition:border-color 0.2s;}
    .field input:focus{border-color:var(--accent);}
    .field input::placeholder{color:var(--muted);}
    .btn{width:100%;padding:13px;background:var(--accent);color:#0e0f11;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.18s;margin-top:4px;}
    .btn:hover:not(:disabled){background:var(--accent-dim);transform:translateY(-1px);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .error-msg{background:var(--red-bg);border:1px solid rgba(255,107,107,0.25);border-radius:var(--radius);color:var(--red);font-size:13px;padding:10px 14px;margin-bottom:14px;display:none;}
    .success-msg{background:var(--green-bg);border:1px solid rgba(93,204,138,0.25);border-radius:var(--radius);color:var(--green);font-size:13px;padding:10px 14px;margin-bottom:14px;display:none;}
    .footer-note{text-align:center;margin-top:24px;font-size:11px;color:var(--muted);font-family:var(--font-mono);}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #0e0f11;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="container">
  <div class="brand">Attend<span>QR</span></div>
  <div class="brand-sub">Lecturer portal</div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign in</div>
      <div class="tab" onclick="switchTab('signup')">Create account</div>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="rayibor@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password" />
      </div>
      <button class="btn" id="login-btn" onclick="login()">Sign in</button>
    </div>

    <!-- SIGNUP -->
    <div id="tab-signup" style="display:none;">
      <div class="field">
        <label>Full name</label>
        <input type="text" id="signup-name" placeholder="e.g. Dr. Raphael Ayibor" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="rayibor@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" />
      </div>
      <button class="btn" id="signup-btn" onclick="signup()">Create account</button>
    </div>
  </div>
  <div class="footer-note">Powered by CS1 2025-2026 KNUST</div>
</div>

<script>
  const SUPABASE_URL = 'https://omdkxclfaicigehnqkjn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tZGt4Y2xmYWljaWdlaG5xa2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzA1OTgsImV4cCI6MjA4OTUwNjU5OH0._yUrFJ-LRQYz7mJesYX1LyZ1bJWM4D3cY2frnlnx-jg';

  // Redirect if already logged in
  const stored = localStorage.getItem('aq_session');
  if (stored) { try { const s = JSON.parse(stored); if (s.access_token) window.location.href = 'index.html'; } catch(e){} }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
    document.getElementById('tab-login').style.display  = tab==='login'  ? 'block' : 'none';
    document.getElementById('tab-signup').style.display = tab==='signup' ? 'block' : 'none';
    hideMessages();
  }

  async function authFetch(endpoint, body) {
    const res = await fetch(SUPABASE_URL + '/auth/v1/' + endpoint, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return res.json();
  }

  async function login() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Please fill in all fields.'); return; }
    setLoading('login-btn', true);
    const data = await authFetch('token?grant_type=password', { email, password });
    setLoading('login-btn', false);
    if (data.error || data.error_description) { showError(data.error_description || data.error); return; }
    localStorage.setItem('aq_session', JSON.stringify({ access_token: data.access_token, user: data.user }));
    window.location.href = 'index.html';
  }

  async function signup() {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
    setLoading('signup-btn', true);
    const data = await authFetch('signup', { email, password, data: { full_name: name } });
    setLoading('signup-btn', false);
    if (data.error || data.error_description) { showError(data.error_description || data.error); return; }
    showSuccess('Account created! Check your email to confirm, then sign in.');
    switchTab('login');
  }

  function showError(msg)   { const el=document.getElementById('error-msg');   el.textContent=msg; el.style.display='block'; document.getElementById('success-msg').style.display='none'; }
  function showSuccess(msg) { const el=document.getElementById('success-msg'); el.textContent=msg; el.style.display='block'; document.getElementById('error-msg').style.display='none'; }
  function hideMessages()   { document.getElementById('error-msg').style.display='none'; document.getElementById('success-msg').style.display='none'; }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> Please wait...' : (btnId==='login-btn' ? 'Sign in' : 'Create account');
  }

  document.addEventListener('keydown', e => { if (e.key==='Enter') { const active=document.getElementById('tab-login').style.display!=='none'; active ? login() : signup(); } });
</script>
</body>
</html>
